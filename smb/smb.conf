[global]
   workgroup = EMARTINEX_CORP
   server string = FileServer-Edu - FLAG{netbios_name_service_enum_ok}
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   server role = standalone server
   obey pam restrictions = yes
   unix password sync = yes
   map to guest = bad user
   usershare allow guests = yes
   
   # Habilitar soporte para NetBIOS y protocolos heredados en un entorno controlado
   server min protocol = NT1
   lanman auth = yes
   ntlm auth = yes

[public]
   comment = Comparticion publica con informacion general
   path = /srv/samba/public
   browseable = yes
   read only = yes
   guest ok = yes
   guest only = yes
   directory mask = 0755
   create mask = 0644

[finance]
   comment = Comparticion de finanzas - Solo usuarios autorizados
   path = /srv/samba/finance
   browseable = yes
   read only = no
   guest ok = no
   valid users = @smbgroup, amartinez, jlopez
   directory mask = 0770
   create mask = 0660

[backup$]
   comment = Comparticion de copia de seguridad oculta
   path = /srv/samba/backup
   browseable = no
   read only = yes
   guest ok = yes
   directory mask = 0755
   create mask = 0644
